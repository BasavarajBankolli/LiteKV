syntax = "proto3";

package litekv;

option go_package = "github.com/yourusername/litekv/proto";

// KVService exposes the core key-value operations over gRPC.
service KVService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc BatchWrite(BatchWriteRequest) returns (BatchWriteResponse);
  rpc Stats(StatsRequest) returns (StatsResponse);
  // Streaming scan over a key range
  rpc Scan(ScanRequest) returns (stream ScanEntry);
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes  value = 1;
  bool   found = 2;
}

message PutRequest {
  string key   = 1;
  bytes  value = 2;
}

message PutResponse {
  bool ok = 1;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool ok = 1;
}

message WriteOp {
  enum Type { PUT = 0; DELETE = 1; }
  Type   type  = 1;
  string key   = 2;
  bytes  value = 3;
}

message BatchWriteRequest {
  repeated WriteOp ops = 1;
}

message BatchWriteResponse {
  bool   ok    = 1;
  string error = 2;
}

message ScanRequest {
  string start_key = 1;
  string end_key   = 2;
  int32  limit     = 3;
}

message ScanEntry {
  string key   = 1;
  bytes  value = 2;
}

message StatsRequest {}

message StatsResponse {
  int64 memtable_size_bytes = 1;
  int64 memtable_entries    = 2;
  int64 wal_size_bytes      = 3;
  int64 clock_version       = 4;
  repeated int32 level_counts = 5;
}
